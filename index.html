﻿<!DOCTYPE html>
<html>
<head>
  <title>Lazyman_XD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Lazyman_XD - Digital Artist & Storyteller. Portfolio featuring artworks, manga, and creative projects.">
  <link rel="icon" type="image/webp" href="./profile website.webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Caveat:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="wallpaper">
  <div class="bg-layer bg-layer-0"></div>
  <div class="bg-layer-shine"></div>
  <div class="bg-layer-foreground"></div>
  <div class="bg-layer-frontyard">
  </div>
  <div class="bg-layer-frontest"></div>
</div>

<canvas id="particle-canvas"></canvas>

<button class="roadmap-toggle-btn" id="roadmapToggleBtn" type="button" aria-label="Toggle roadmap image">
  <img src="./profile website.webp" alt="Roadmap Toggle">
</button>

<div class="roadmap-overlay" id="roadmapOverlay">
  <img src="./roadmap.webp" alt="Roadmap" class="roadmap-modal-image" loading="lazy" decoding="async">
</div>

<div class="loading-screen" id="loadingScreen">
</div>

<div class="desktop" id="desktop">

  <div class="middle-tab" id="middleTab">
    <div class="middle-tab-header" onmousedown="dragStart(event, middleTab)" style="display: none;">
      <div class="middle-tab-header-title"></div>
      <div class="window-controls">
        <button class="win-btn close" title="Close" onclick="closeMiddleTab(event)">✕</button>
      </div>
    </div>
    <div class="middle-tab-content" id="tabContent"></div>
  </div>

  <div class="middle-open-btn" id="middleOpenBtn" onclick="openMiddleTab()">
    <img src="./icons8-infinite-50.webp" alt="open" loading="lazy">
  </div>

  <!-- Artwork Overlay -->
<div class="artwork-overlay" id="artworkOverlay" onclick="closeAllExpanded()"></div>

<!-- AI Companion Orb -->
<div class="ai-companion center" id="aiCompanion">
  <div class="ai-orb" id="aiOrb">
    <img src="./profile website.webp" alt="AI Avatar" class="ai-avatar-img">
    <div class="ai-wavelength">
      <div class="ai-wave-bar"></div>
      <div class="ai-wave-bar"></div>
      <div class="ai-wave-bar"></div>
      <div class="ai-wave-bar"></div>
      <div class="ai-wave-bar"></div>
      <div class="ai-wave-bar"></div>
      <div class="ai-wave-bar"></div>
      <div class="ai-wave-bar"></div>
    </div>
  </div>
  <div class="ai-speech-bubble" id="aiSpeechBubble">
    <span id="aiSpeechText"></span><span class="ai-typing-cursor" id="aiTypingCursor"></span>
  </div>
  <button class="ai-close-btn" onclick="closeAICompanion()">✕</button>
</div>

<!-- AI Quick Options -->
<div class="ai-options" id="aiOptions">
  <button class="ai-option-btn" onclick="askAI('commissions')">Commissions?</button>
  <button class="ai-option-btn" onclick="askAI('artworks')">Artworks</button>
  <button class="ai-option-btn" onclick="askAI('mangas')">Mangas</button>
  <button class="ai-option-btn" onclick="askAI('roadmap')">Roadmap?</button>
  <button class="ai-option-btn" onclick="askAI('who')">Who am I?</button>
  <button class="ai-option-btn" onclick="askAI('why')">Why am I?</button>
  <button class="ai-option-btn" onclick="askAI('effort')">Why put the effort on this AI?</button>
  <button class="ai-option-btn" onclick="askAI('characters')">Who are the characters on screen?</button>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
